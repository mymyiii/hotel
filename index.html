<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hotel Memories Prototype</title><link rel="stylesheet" href="style.css"></head><body><div class="app"><aside><section class="brand panel"><h1>Hotel Memories</h1><p>泊まった夜を、部屋として残す。</p></section><section class="building panel"><div class="building-head"><div><div class="building-title">My Hotel</div><small>思い出のホテル</small></div><button class="btn">Night</button></div><div class="facade" id="facade"></div><div class="nav"><button>HOTEL</button><button>ARCHIVE</button><button>MAP</button><button>KEY</button></div></section></aside><main class="center"><div class="steps" id="steps"></div><section class="main-card panel"><div class="topline"><div><h2 id="roomTitle">ROOM 402</h2><p id="roomSub">2024.05.18 - City Hotel / Vienna</p></div><button class="btn" id="newRoom">＋ 新しい部屋を追加</button></div><div class="workspace"><div class="mini-room" id="miniRoom"><div class="window"></div><div class="curtain"></div><div class="curtain r"></div><div class="floor"></div><div class="desk"></div><div class="bed"><div class="pillow"></div><div class="pillow two"></div></div><div class="lamp"></div><div class="keytag"></div></div><div class="side-card"><section class="key-card panel"><small>Room Key</small><div class="key-visual" id="keyVisual">402</div><button class="btn" id="changeKey">キーを変更</button></section><section class="upload panel"><label class="drop">写真をアップロード<br><small>部屋の雰囲気を反映</small><input id="photoInput" type="file" accept="image/*"></label><div class="progress"><div class="bar" id="bar"></div></div></section></div></div></section><section class="items panel"><h3>Room Items</h3><div class="item-row" id="items"></div></section></main><aside class="right"><section class="memo panel"><h3>思い出メモ</h3><textarea id="memo">初めてのウィーン。静かなホテルで、ゆっくり本を読んだ夜。雨の音と紅茶の香りがいまも心に残ってる。</textarea><button class="btn save" id="saveBtn">思い出を保存</button></section><section class="memo panel"><h3>写真</h3><div class="photos" id="photos"></div></section><section class="memo panel"><h3>Mood Tags</h3><div class="tags" id="tags"></div></section></aside></div><script src="script.js"></script></body></html>
